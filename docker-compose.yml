services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: cars
      POSTGRES_PASSWORD: cars
      POSTGRES_DB: cars
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cars"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    command: >
      mlflow server
      --backend-store-uri postgresql://cars:cars@postgres:5432/cars
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://cars:cars@postgres:5432/cars
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ml_service:
    build: .
    command: python -m uvicorn ml_service.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cars:cars@postgres:5432/cars
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./models:/app/models
      - ./assets:/app/assets
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bot:
    build: .
    command: python bot/main.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cars:cars@postgres:5432/cars
      REDIS_URL: redis://redis:6379/0
      ML_SERVICE_URL: http://ml_service:8000
    volumes:
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml_service:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=1
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cars:cars@postgres:5432/cars
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./models:/app/models
      - ./assets:/app/assets
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build: .
    command: celery -A tasks.celery_app beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cars:cars@postgres:5432/cars
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  mlflow_artifacts:
