services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: cars
      POSTGRES_PASSWORD: cars
      POSTGRES_DB: cars
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cars"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  bot:
    build: .
    command: python bot/main.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cars:cars@postgres:5432/cars
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=1
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cars:cars@postgres:5432/cars
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build: .
    command: celery -A tasks.celery_app beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cars:cars@postgres:5432/cars
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
